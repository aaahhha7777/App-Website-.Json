}
function closeEpModal() { document.getElementById('epModal').classList.remove('open'); }
function closeModalOutside(e) { if(e.target.id==='epModal') closeEpModal(); }

function renderEpList() {
  const listEl=document.getElementById('epListContent');
  const allEps=CONTENT.episodes||[];
  const seasonEps=allEps.map((ep,i)=>({ep,i})).filter(({ep})=>ep.s===currentSeason);
  listEl.innerHTML=seasonEps.map(({ep,i})=>{
    const isNow=i===currentEpIndex&&isPlaying;
    const prog=getEpProgress(ep.id);
    const pct=prog?prog.progress:0;
    const elapsed=prog?prog.elapsedSeconds:0;
    const timeStr=elapsed>0?fmtTime(elapsed):'';
    return (
      '<div class="ep-item focusable'+(isNow?' highlight-ep':'')+'" tabindex="0" data-epidx="'+i+'">' +
        '<div class="ep-thumb-wrap"><img src="'+(ep.thumb||'')+'" class="ep-thumb" loading="lazy">' +
        '<div class="ep-thumb-play"><i class="fa-solid fa-play"></i></div>' +
        (pct>0?'<div class="ep-thumb-prog"><div class="ep-thumb-prog-bar" style="width:'+pct+'%"></div></div>':'')+
        '</div><div class="ep-info"><div class="ep-title">E'+ep.e+' — '+ep.label+
        (isNow?'<span class="highlight-badge">NOW PLAYING</span>':'')+(timeStr&&!isNow?'<span style="font-size:.58rem;color:var(--red);margin-left:6px;font-weight:700">'+timeStr+'</span>':'')+
        '</div>'+(ep.desc?'<div class="ep-desc">'+ep.desc+'</div>':'')+
        '</div></div>'
    );
  }).join('')||'<div style="padding:24px;color:#444;text-align:center;font-size:.82rem;">No episodes in this season.</div>';
  listEl.querySelectorAll('.ep-item[data-epidx]').forEach(item=>{
    item.addEventListener('click',()=>selectEpisode(parseInt(item.dataset.epidx)));
    item.addEventListener('keydown',e=>{ if(e.key==='Enter')selectEpisode(parseInt(item.dataset.epidx)); });
  });
  setTimeout(()=>{ (listEl.querySelector('.highlight-ep')||listEl.querySelector('.ep-item'))?.scrollIntoView({block:'nearest'}); }, 80);
}

function selectEpisode(idx) {
  if (isPlaying) { stopProg(); saveHistory(); }
  currentEpIndex=idx; isPlaying=false;
  closeEpModal(); updateEpInfo(); updateNavBtns(); showPlaceholder();
}

/* ════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════ */
function navigate(dir) {
  if (!CONTENT||CONTENT.isMovie) return;
  const newIdx=currentEpIndex+dir;
  if (newIdx<0||newIdx>=(CONTENT.episodes||[]).length) return;
  if (isPlaying) { stopProg(); saveHistory(); }
  currentEpIndex=newIdx; isPlaying=false;
  updateEpInfo(); updateNavBtns();
  playNow(); /* auto-play next/prev */
}
function updateNavBtns() {
  if (!CONTENT||CONTENT.isMovie) return;
  const eps=CONTENT.episodes||[];
  document.getElementById('prevBtn')?.classList.toggle('hidden', currentEpIndex===0);
  document.getElementById('nextBtn')?.classList.toggle('hidden', currentEpIndex>=eps.length-1);
}

/* ════════════════════════════════════════════════════════════
   WATCHLIST
════════════════════════════════════════════════════════════ */
function getWL()   { try{return JSON.parse(_sGet('vs_wl2')||'[]');}catch{return[];} }
function setWL(d)  { try{_sSet('vs_wl2',JSON.stringify(d));}catch(e){} }
function syncWLBtn() { document.getElementById('wlBtn').classList.toggle('active',getWL().some(i=>i.title===CONTENT.title)); }
function toggleWatchlist() {
  let wl=getWL(); const i=wl.findIndex(x=>x.title===CONTENT.title);
  if(i>-1){wl.splice(i,1);showToast('Removed from Watchlist');}
  else{wl.unshift({title:CONTENT.title,poster:CONTENT.poster,isMovie:CONTENT.isMovie,added:Date.now()});showToast('Added to Watchlist ❤️');}
  setWL(wl); syncWLBtn(); renderWatchlist();
}
function renderWatchlist() {
  const wl=getWL(),sec=document.getElementById('watchlistSection'),row=document.getElementById('wlRow');
  if(!wl.length){sec.style.display='none';return;}
  sec.style.display='block';
  row.innerHTML=wl.map(item=>`
    <div class="t-card focusable" tabindex="0" onclick="showToast('Opening: ${escQ(item.title)}')" title="${escQ(item.title)}">
      <img src="${item.poster}" loading="lazy" onerror="this.src='https://via.placeholder.com/130x195/0d0d0d/333?text=%20'">
      <div class="card-overlay"><div class="title">${item.title}</div><div class="card-badges"><span class="badge">${item.isMovie?'Movie':'Series'}</span></div></div>
      <div class="play-overlay"><div class="play-btn-round"><i class="fa-solid fa-play"></i></div></div>
    </div>`).join('');
  setTimeout(()=>checkArrows('wlRow'),80); setupDrag('wlRow');
}

/* ════════════════════════════════════════════════════════════
   HISTORY
════════════════════════════════════════════════════════════ */
const HIST_KEY='vs_hist3';
function getHist(){ try{return JSON.parse(_sGet(HIST_KEY)||'[]');}catch{return[];} }
function setHist(d){ try{_sSet(HIST_KEY,JSON.stringify(d));}catch(e){} }
function _seriesKey(){ return CONTENT.title; }
function saveHistory() {
  if(!isPlaying) return;
  const elapsed=_elapsed(); if(elapsed<2) return;
  const ep=!CONTENT.isMovie?CONTENT.episodes[currentEpIndex]:null;
  const pct=Math.max(2,_progPct()); const key=_seriesKey();
  let h=getHist(); let entry=h.find(x=>x.key===key);
  if(!entry){
    entry={key,title:CONTENT.title,poster:CONTENT.poster,isMovie:CONTENT.isMovie,
      lastEpIdx:currentEpIndex,lastEpLabel:ep?('S'+ep.s+' E'+ep.e):'Movie',
      lastSrc:ep?(ep.url||ep.embedId||''):(CONTENT.url||CONTENT.embedId||''),saved:Date.now(),eps:{}};
    h.unshift(entry);
  } else { h=h.filter(x=>x.key!==key); h.unshift(entry); }
  entry.lastEpIdx=currentEpIndex; entry.lastEpLabel=ep?('S'+ep.s+' E'+ep.e):'Movie';
  entry.lastSrc=ep?(ep.url||ep.embedId||''):(CONTENT.url||CONTENT.embedId||''); entry.saved=Date.now();
  const epKey=ep?ep.id:'__movie__';
  entry.eps[epKey]={elapsedSeconds:elapsed,progress:pct,epIdx:currentEpIndex};
  if(h.length>24) h=h.slice(0,24);
  setHist(h);
}
function getEpProgress(epId){
  const h=getHist(); const entry=h.find(x=>x.key===_seriesKey());
  if(!entry||!entry.eps) return null; return entry.eps[epId]||null;
}
function renderHistory() {
  const h=getHist(),sec=document.getElementById('historySection'),row=document.getElementById('histRow');
  if(!h.length){sec.style.display='none';return;}
  sec.style.display='block';
  row.innerHTML=h.map((item,i)=>{
    const allEps=Object.values(item.eps||{}); const maxPct=allEps.length?Math.max(...allEps.map(e=>e.progress||0)):2;
    const lastEp=item.isMovie?(item.eps?.['__movie__']):null; const pct=lastEp?(lastEp.progress||2):(allEps.length?maxPct:2);
    const epCnt=allEps.length; const badge=item.isMovie?'Movie':(item.lastEpLabel+(epCnt>1?' +'+(epCnt-1)+' more':''));
    return '<div class="t-card focusable" tabindex="0" data-hidx="'+i+'">'+
      '<img src="'+item.poster+'" loading="lazy" onerror="this.src=\'https://via.placeholder.com/130x195/0d0d0d/333?text=%20\'">'+
      '<div class="h-progress"><div class="h-bar" style="width:'+pct+'%"></div></div>'+
      '<div class="card-overlay"><div class="title">'+item.title+'</div><div class="card-badges"><span class="badge badge-active">'+badge+'</span></div></div>'+
      '<div class="play-overlay"><div class="play-btn-round"><i class="fa-solid fa-play"></i></div></div></div>';
  }).join('');
  row.querySelectorAll('.t-card[data-hidx]').forEach(card=>{
    card.addEventListener('click',()=>{
      if(isDrag) return;
      const item=getHist()[parseInt(card.dataset.hidx)]; if(!item) return;
      const _epP=item.eps?(item.eps['__movie__']||Object.values(item.eps)[0]):null;
      const _rsec=_epP?(_epP.elapsedSeconds||0):0;
      function _doRes(src){_savedSeconds=_rsec;_playStartTime=null;_resumeOverride=true;loadPlayer(src);}
      if(item.isMovie){_doRes(item.lastSrc);showToast('▶ '+item.title+(_rsec>2?' · '+fmtTime(_rsec):''));}
      else if(item.title===CONTENT?.title){openEpModal();}
      else{_doRes(item.lastSrc);showToast('▶ '+item.title);}
    });
  });
  setTimeout(()=>checkArrows('histRow'),80); setupDrag('histRow');
}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`;}

let _tt; function clearHist(){
  const t=document.getElementById('toast'); t.innerHTML=`History cleared &nbsp;<span onclick="undoClear()" style="text-decoration:underline;cursor:pointer;color:#2ecc71">Undo</span>`;
  t.className='show'; _clrBkp=getHist(); setHist([]); renderHistory(); clearTimeout(_tt); _tt=setTimeout(()=>{t.className='';_clrBkp=null;},4000);
}
let _clrBkp=null; function undoClear(){if(_clrBkp){setHist(_clrBkp);renderHistory();_clrBkp=null;}const t=document.getElementById('toast');t.innerHTML='History restored';clearTimeout(_tt);_tt=setTimeout(()=>t.className='',2000);}

/* ════════════════════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════════════════════ */
const _mem={};
function _sSet(k,v){try{localStorage.setItem(k,v);return;}catch(e){}try{sessionStorage.setItem(k,v);return;}catch(e){}_mem[k]=v;}
function _sGet(k){try{const v=localStorage.getItem(k);if(v!==null)return v;}catch(e){}try{const v=sessionStorage.getItem(k);if(v!==null)return v;}catch(e){}return _mem[k]||null;}

/* ════════════════════════════════════════════════════════════
   SCROLL / DRAG / ARROWS
════════════════════════════════════════════════════════════ */
function scrollSection(id,dir){document.getElementById(id)?.scrollBy({left:dir*280,behavior:'smooth'});}
function checkArrows(rowId){
  const row=document.getElementById(rowId);if(!row)return;
  const p=row.parentElement;if(!p)return;
  const lB=p.querySelector('.scroll-btn.left'),rB=p.querySelector('.scroll-btn.right');if(!lB||!rB)return;
  const has=row.scrollWidth>row.clientWidth+2;
  lB.classList.toggle('visible',has&&row.scrollLeft>10);
  rB.classList.toggle('visible',has&&row.scrollLeft+row.clientWidth<row.scrollWidth-5);
}
let isDrag=false;
function setupDrag(id){
  const sl=document.getElementById(id);if(!sl||sl._ds)return; sl._ds=true;
  checkArrows(id); sl.addEventListener('scroll',()=>checkArrows(id));
  window.addEventListener('resize',()=>checkArrows(id));
  let isDown=false,startX,sL;
  sl.addEventListener('mousedown',e=>{isDown=true;isDrag=false;sl.classList.add('dragging');startX=e.pageX-sl.offsetLeft;sL=sl.scrollLeft;});
  sl.addEventListener('mouseleave',()=>{isDown=false;sl.classList.remove('dragging');});
  sl.addEventListener('mouseup',()=>{isDown=false;sl.classList.remove('dragging');setTimeout(()=>isDrag=false,50);});
  sl.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();const w=(e.pageX-sl.offsetLeft-startX)*2;if(Math.abs(w)>5)isDrag=true;sl.scrollLeft=sL-w;});
}

/* ════════════════════════════════════════════════════════════
   MISC
════════════════════════════════════════════════════════════ */
function toggleFullScreen(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();}
let _toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='show';clearTimeout(_toastT);_toastT=setTimeout(()=>t.className='',3000);}
function escQ(s){return String(s).replace(/'/g,"\\'")}
</script>
